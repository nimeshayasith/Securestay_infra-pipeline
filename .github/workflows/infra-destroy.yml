name: "Infrastructure Destroy"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm permanent infrastructure teardown"
        required: true
        type: string

concurrency:
  group: infra-destroy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - uses: actions/checkout@v4

      - name: Require explicit destroy confirmation
        if: ${{ inputs.confirm_destroy != 'DESTROY' }}
        run: |
          echo "Refusing to destroy production infrastructure without explicit confirmation."
          echo "Re-run this workflow and set confirm_destroy to DESTROY."
          exit 1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.4"

      - name: Init
        run: terraform init

      - name: Destroy Plan
        run: terraform plan -destroy -no-color
        env:
          TF_VAR_db_password:       ${{ secrets.TF_VAR_db_password }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_rabbitmq_password }}

      - name: Update kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name securestay-eks

      - name: Uninstall NGINX Ingress Controller
        continue-on-error: true
        run: helm uninstall ingress-nginx -n ingress-nginx

      - name: Uninstall AWS Load Balancer Controller
        continue-on-error: true
        run: helm uninstall aws-load-balancer-controller -n kube-system

      - name: Destroy
        run: terraform destroy -auto-approve -input=false
        env:
          TF_VAR_db_password:       ${{ secrets.TF_VAR_db_password }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_rabbitmq_password }}
