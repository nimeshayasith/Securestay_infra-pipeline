name: "Infrastructure Plan"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "environments/**"
      - "modules/**"
      - "helm/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: infra-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Format Check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_db_password:       ${{ secrets.TF_VAR_db_password }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_rabbitmq_password }}
        continue-on-error: true

      - name: Render Plan Output
        if: steps.plan.outcome == 'success'
        run: terraform show -no-color tfplan > plan.txt

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- securestay-terraform-plan -->';
            const outcome = '${{ steps.plan.outcome }}';
            let plan = 'Terraform plan failed before a plan file could be rendered.';
            const planPath = 'environments/prod/plan.txt';

            if (fs.existsSync(planPath)) {
              plan = fs.readFileSync(planPath, 'utf8');
              if (plan.length > 60000) {
                plan = `${plan.slice(0, 60000)}\n...truncated...`;
              }
            }

            const body = `${marker}
            #### Terraform Plan \`${outcome}\`
            <details><summary>Show Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`
            </details>

            *Actor: @${{ github.actor }} | Workflow: ${{ github.workflow }}*`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
