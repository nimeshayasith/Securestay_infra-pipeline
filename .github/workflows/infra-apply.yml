name: "Infrastructure Apply"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "environments/**"
      - "modules/**"
      - "helm/**"

concurrency:
  group: infra-apply-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval: Settings → Environments → production
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.4"

      - uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Init
        run: terraform init

      - name: Apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_db_password:       ${{ secrets.TF_VAR_db_password }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_rabbitmq_password }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }} \
            --name securestay-eks

      - name: Wait for EKS nodes and system add-ons
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=10m
          kubectl rollout status deployment/coredns -n kube-system --timeout=10m
          kubectl rollout status daemonset/aws-node -n kube-system --timeout=10m
          kubectl rollout status daemonset/kube-proxy -n kube-system --timeout=10m

      - name: Check AWS Load Balancer Controller service account
        id: alb_controller_sa
        run: |
          if kubectl get serviceaccount aws-load-balancer-controller -n kube-system >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install AWS Load Balancer Controller
        if: steps.alb_controller_sa.outputs.exists == 'true'
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --wait \
            --timeout 15m \
            --set clusterName=securestay-eks \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller

      - name: Skip AWS Load Balancer Controller
        if: steps.alb_controller_sa.outputs.exists != 'true'
        run: echo "Skipping AWS Load Balancer Controller because the required kube-system/aws-load-balancer-controller service account is not present."

      - name: Clean up failed NGINX ingress release
        run: |
          helm uninstall ingress-nginx -n ingress-nginx || true
          kubectl delete job ingress-nginx-admission-create -n ingress-nginx --ignore-not-found=true
          kubectl delete job ingress-nginx-admission-patch -n ingress-nginx --ignore-not-found=true
          kubectl delete pod -n ingress-nginx -l app.kubernetes.io/instance=ingress-nginx --ignore-not-found=true

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            -n ingress-nginx --create-namespace \
            --wait \
            --timeout 15m \
            --set controller.replicaCount=1 \
            --set controller.admissionWebhooks.enabled=false \
            --set controller.service.type=LoadBalancer

      - name: Print RDS Endpoint
        run: |
          echo "============================================================"
          echo "RDS endpoint — paste into App repo DATABASE_URL secret:"
          terraform output -raw rds_endpoint
          echo ""
          echo ""
          echo "Full DATABASE_URL format:"
          terraform output database_url_format
          echo "============================================================"

      - name: Print ECR Repository URLs
        run: terraform output ecr_repository_urls
