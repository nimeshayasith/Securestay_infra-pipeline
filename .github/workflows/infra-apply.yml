name: "Infrastructure Apply"

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "helm/**"

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval: Settings → Environments → production
    defaults:
      run:
        working-directory: environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Init
        run: terraform init

      - name: Apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_db_password:       ${{ secrets.TF_VAR_db_password }}
          TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_rabbitmq_password }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name securestay-eks

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=securestay-eks \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            -n ingress-nginx --create-namespace \
            --set controller.service.type=LoadBalancer

      - name: Print RDS Endpoint
        run: |
          echo "============================================================"
          echo "RDS endpoint — paste into App repo DATABASE_URL secret:"
          terraform output -raw rds_endpoint
          echo ""
          echo ""
          echo "Full DATABASE_URL format:"
          terraform output database_url_format
          echo "============================================================"

      - name: Print ECR Repository URLs
        run: terraform output ecr_repository_urls
