replicaCount: 3

auth:
  username: securestay_admin
  # password is injected via set_sensitive in modules/rabbitmq/main.tf
  erlangCookie: "REPLACE_WITH_LONG_RANDOM_SECRET_64_CHARS"

persistence:
  enabled: true
  size: 8Gi
  storageClass: "gp2"

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"  # INTERNAL ONLY — not internet-facing

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

metrics:
  enabled: true  # Pre-wired for future Prometheus integration
